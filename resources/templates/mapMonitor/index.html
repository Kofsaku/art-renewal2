<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>マップモニター</title>
    <style>
        /* ---- コンテンツラッパー ---- */
        .sm-outer {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 4px;
            box-sizing: border-box;
            background: var(--td-header-bg);
        }
        .sm-inner {
            flex: 1;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            background: #e0ecf8;
            border: 1px solid var(--td-border);
            border-radius: 8px;
            overflow: hidden;
        }

        /* ---- マップモニター固有レイアウト ---- */
        .mm-layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ---- 左サイドバー（フロアタブ） ---- */
        .mm-sidebar {
            width: 160px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            background: var(--td-header-bg);
        }
        .mm-floor-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--td-border);
            border-radius: 8px;
            background: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mm-floor-btn:hover {
            background: #e9ecef;
        }
        .mm-floor-btn.active {
            background: var(--td-accent);
            border-color: var(--td-accent);
            color: #fff;
        }
        .mm-floor-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border-radius: 12px;
            background: rgba(0,0,0,0.1);
            font-size: 0.75rem;
            font-weight: 600;
        }
        .mm-floor-btn.active .mm-floor-badge {
            background: rgba(255,255,255,0.25);
        }

        /* ---- マップエリア ---- */
        .mm-map-wrapper {
            flex: 1;
            background: #000 !important;
            overflow: auto;
            position: relative;
        }
        .mm-map-viewport {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mm-floor-plan {
            position: relative;
            width: 800px;
            height: 500px;
            background: url('/resources/static/images/floor_sample.jpg') no-repeat center center;
            background-size: contain;
            border: 2px solid #555;
            margin: 50px auto;
            transform-origin: 50% 50%;
            transition: transform 0.3s ease;
        }

        /* ---- ゲートポインター ---- */
        .gate-pointer {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }
        .gate-pointer:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .pointer-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
        }
        .pointer-circle.status-normal  { background: #28a745; box-shadow: 0 0 0 2px #28a745; }
        .pointer-circle.status-warning { background: #ffc107; box-shadow: 0 0 0 2px #ffc107; }
        .pointer-circle.status-error   { background: #dc3545; box-shadow: 0 0 0 2px #dc3545; }
        .pointer-circle.status-offline { background: #6c757d; box-shadow: 0 0 0 2px #6c757d; }

        /* ---- ツールチップ ---- */
        .gate-tooltip {
            position: absolute;
            background: white;
            border: 3px solid #28a745;
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1001;
            min-width: 220px;
            opacity: 0;
            transform: scale(0.8) translate(-50%, -100%);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            top: -15px;
            left: 50%;
            transform-origin: bottom center;
        }
        .gate-pointer:hover .gate-tooltip { opacity: 1; transform: scale(1); }
        .gate-tooltip.status-normal  { border-color: #28a745; }
        .gate-tooltip.status-warning { border-color: #ffc107; }
        .gate-tooltip.status-error   { border-color: #dc3545; }
        .gate-tooltip.status-offline { border-color: #6c757d; }

        .tooltip-header {
            display: flex;
            align-items: center;
            margin: 0 0 12px 0;
            font-weight: bold;
            font-size: 1rem;
            line-height: 1.2;
            color: #333;
        }
        .tooltip-header .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .tooltip-header span {
            color: #333;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .tooltip-icons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            width: 100%;
            border: 1px solid #dee2e6;
            background: white;
        }
        .tooltip-icon-item {
            aspect-ratio: 1/1;
            width: 100%;
            border-right: 1px solid #dee2e6;
            background-size: 28px 28px;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            min-height: 45px;
        }
        .tooltip-icon-item:last-child { border-right: none; }
        .tooltip-icon-door     { background-image: url('/resources/static/images/gate/1_door_state/door_closed.png'); }
        .tooltip-icon-lock     { background-image: url('/resources/static/images/gate/2_lock_state/door_locking.png'); }
        .tooltip-icon-security { background-image: url('/resources/static/images/gate/4_security_state/gate_sec_set.png'); }
        .tooltip-icon-comm     { background-image: url('/resources/static/images/gate/1_door_state/door_opening.png'); }

        /* ---- 一斉制御ボタン ---- */
        .mm-batch-ctrl-btn {
            background: #dc3545 !important;
            border-color: #dc3545 !important;
        }
        .mm-batch-ctrl-btn:hover {
            background: #c82333 !important;
            border-color: #bd2130 !important;
        }

        /* ---- 凡例（statusMonitorと同一パターン） ---- */
        .sm-legend {
            flex-shrink: 0;
            background: #ffffff;
            border-top: 1px solid var(--td-border);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            font-size: 0.78rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-icon-img {
            width: 16px;
            height: 16px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            flex-shrink: 0;
        }
        .legend-check { font-size: 0.9em; }
        .legend-divider {
            width: 1px;
            height: 16px;
            background: #ccc;
        }
        .icon-door-closed  { background-image: url('/resources/static/images/gate/1_door_state/door_closed.png'); }
        .icon-door-open    { background-image: url('/resources/static/images/gate/1_door_state/door_opening.png'); }
        .icon-lock-locked  { background-image: url('/resources/static/images/gate/2_lock_state/door_locking.png'); }
        .icon-lock-unlocked{ background-image: url('/resources/static/images/gate/2_lock_state/door_unlocking.png'); }
        .icon-alarm-error  { background-image: url('/resources/static/images/gate/3_alarm_state/alarm_abnormal.png'); }
        .icon-security-set { background-image: url('/resources/static/images/gate/4_security_state/gate_sec_set.png'); }
    </style>
</head>

<body>
    <!-- ヘッダー固有コントロール -->
    <div layout:fragment="header-controls" class="td-header-controls">
        <button class="td-layout-btn" onclick="zoomIn()" title="ズームイン">
            <i class="fas fa-plus"></i>
        </button>
        <button class="td-layout-btn" onclick="zoomOut()" title="ズームアウト">
            <i class="fas fa-minus"></i>
        </button>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
            <button class="td-layout-btn" title="通知">
                <i class="fas fa-bell"></i>
            </button>
            <button class="td-page-btn mm-batch-ctrl-btn" onclick="showGroupControlModal()">
                一斉遠隔操作
            </button>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div layout:fragment="content">
        <div class="sm-outer">
            <div class="mm-layout">
                <!-- 左サイドバー: フロアタブ -->
                <div class="mm-sidebar">
                    <button class="mm-floor-btn active" data-floor="1">
                        フロア1 <span class="mm-floor-badge">8</span>
                    </button>
                    <button class="mm-floor-btn" data-floor="2">
                        フロア2 <span class="mm-floor-badge">6</span>
                    </button>
                    <button class="mm-floor-btn" data-floor="3">
                        フロア3 <span class="mm-floor-badge">4</span>
                    </button>
                </div>

                <!-- マップエリア -->
                <div class="sm-inner mm-map-wrapper">
                    <div class="mm-map-viewport" id="mapViewport">
                        <div class="mm-floor-plan" id="floorPlan">
                            <!-- ゲートポインターはJSで動的生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- グループ制御モーダル -->
        <div class="modal fade" id="groupControlModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">一斉遠隔操作</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>グループ選択 <span class="text-muted">※複数選択可</span></h6>
                                <div class="group-selection mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="A" id="groupA">
                                        <label class="form-check-label" for="groupA">グループA</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="B" id="groupB">
                                        <label class="form-check-label" for="groupB">グループB</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="C" id="groupC">
                                        <label class="form-check-label" for="groupC">グループC</label>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <h6>遠隔操作 <span class="text-muted">※複数選択不可</span></h6>
                                <div class="remote-operation mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="remoteOperation" value="continuous_unlock" id="continuousUnlock">
                                        <label class="form-check-label" for="continuousUnlock">連続解錠</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="remoteOperation" value="unlock" id="unlock">
                                        <label class="form-check-label" for="unlock">解錠</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="remoteOperation" value="lock" id="lock">
                                        <label class="form-check-label" for="lock">施錠</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="remoteOperation" value="guard_set" id="guardSet">
                                        <label class="form-check-label" for="guardSet">警備セット</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="remoteOperation" value="guard_release" id="guardRelease">
                                        <label class="form-check-label" for="guardRelease">警備セット解除</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-end mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                            <button type="button" class="btn btn-primary" onclick="executeGroupControl()">実行</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ゲート詳細モーダル -->
        <div class="modal fade" id="gateDetailModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h5 class="modal-title">遠隔操作 - <span id="modalGateNumber"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-5">
                                <div class="mb-3">
                                    <div class="fw-bold mb-1">現在状態</div>
                                    <div id="modalGateStatus"></div>
                                </div>
                                <div>
                                    <div class="fw-bold mb-1">最終更新</div>
                                    <div id="modalLastUpdate"></div>
                                </div>
                            </div>
                            <div class="col-7">
                                <div class="fw-bold mb-2">遠隔操作 <span class="text-muted" style="font-size: 0.85em;">※複数選択不可</span></div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="singleRemoteOperation" value="continuous_unlock" id="singleContinuousUnlock">
                                    <label class="form-check-label" for="singleContinuousUnlock">連続解錠</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="singleRemoteOperation" value="unlock" id="singleUnlock">
                                    <label class="form-check-label" for="singleUnlock">解錠</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="singleRemoteOperation" value="lock" id="singleLock">
                                    <label class="form-check-label" for="singleLock">施錠</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="singleRemoteOperation" value="guard_set" id="singleGuardSet">
                                    <label class="form-check-label" for="singleGuardSet">警備セット</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="singleRemoteOperation" value="guard_release" id="singleGuardRelease">
                                    <label class="form-check-label" for="singleGuardRelease">警備セット解除</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">キャンセル</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="executeSingleRemoteCommand()">実行</button>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript" th:src="@{/js/mapMonitor.js}"></script>
    </div>

    <!-- 凡例（コピーライト直上） -->
    <div layout:fragment="page-legend">
        <div class="sm-legend">
            <div class="legend-item">
                <div class="legend-icon-img icon-door-closed"></div>
                <span>閉扉</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon-img icon-door-open"></div>
                <span>開扉</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon-img icon-lock-locked"></div>
                <span>施錠</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon-img icon-lock-unlocked"></div>
                <span>解錠</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon-img icon-alarm-error"></div>
                <span>異常</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon-img icon-security-set"></div>
                <span>警備セット</span>
            </div>
            <div class="legend-divider"></div>
            <div class="legend-item">
                <input type="checkbox" class="status-filter-checkbox" value="normal" checked>
                <div class="legend-dot" style="background:#28a745;"></div>
                <span>正常</span>
            </div>
            <div class="legend-item">
                <input type="checkbox" class="status-filter-checkbox" value="warning" checked>
                <div class="legend-dot" style="background:#e07b00;"></div>
                <span>警告</span>
            </div>
            <div class="legend-item">
                <input type="checkbox" class="status-filter-checkbox" value="error" checked>
                <div class="legend-dot" style="background:#dc3545;"></div>
                <span>異常</span>
            </div>
            <div class="legend-item">
                <input type="checkbox" class="status-filter-checkbox" value="offline" checked>
                <div class="legend-dot" style="background:#6c757d;"></div>
                <span>オフライン</span>
            </div>
        </div>
    </div>
</body>
</html>
